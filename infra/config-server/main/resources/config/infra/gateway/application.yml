server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      default-filters:
        - AddRequestHeader=X-Forwarded-By, gateway
      routes:

        # ── 1. Корзина ───────────────────────────────────────────────────────
        - id: shopping_cart_route
          uri: lb://shopping-cart
          predicates:
            - Path=/shopping-cart/**
          filters:
            - PrefixPath=/api/v1

        # ── 2. Витрина ───────────────────────────────────────────────────────
        - id: shopping_store_route
          uri: lb://shopping-store
          predicates:
            - Path=/shopping-store/**
          filters:
            - PrefixPath=/api/v1
            - name: Retry
              args:
                retries: 3
                statuses: NOT_FOUND
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false

        # ── 3. Склад ─────────────────────────────────────────────────────────
        - id: warehouse_route
          uri: lb://warehouse
          predicates:
            - Path=/warehouse/**
          filters:
            - PrefixPath=/api/v1

        # ── 4. Заказ ─────────────────────────────────────────────────────────
        - id: order_route
          uri: lb://order
          predicates:
            - Path=/order/**
          filters:
            - PrefixPath=/api/v1

        # ── 5. Оплата ────────────────────────────────────────────────────────
        - id: payment_route
          uri: lb://payment
          predicates:
            - Path=/payment/**
          filters:
            - PrefixPath=/api/v1

        # ── 6. Доставка ──────────────────────────────────────────────────────
        - id: delivery_route
          uri: lb://delivery
          predicates:
            - Path=/delivery/**
          filters:
            - PrefixPath=/api/v1

resilience4j:
  circuitbreaker:
    instances:
      shopping-store:
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        automatic-transition-from-open-to-half-open-enabled: true
      shopping-cart:
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        automatic-transition-from-open-to-half-open-enabled: true
      order:
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        automatic-transition-from-open-to-half-open-enabled: true
      payment:
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        automatic-transition-from-open-to-half-open-enabled: true
      delivery:
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      shopping-store:
        timeout-duration: 3s
      shopping-cart:
        timeout-duration: 3s
      order:
        timeout-duration: 5s
      payment:
        timeout-duration: 5s
      delivery:
        timeout-duration: 5s